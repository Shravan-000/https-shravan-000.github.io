<!DOCTYPE html>
<html>
    <head>
        <style>
            div{
                background-color: red;
                width: 200px;
                height: 80px;
                border: 1px solid;
                overflow: visible;
            }
        </style>
    </head>
    <body>
        <h2>Overflow:Visible</h2>
        <p>By Default, the overflow is visible,meaning that it is not clipped and it renders outside the element's box:</p>
        <div>You can use the overflow property when you want to havebetter control of of the layout.the overflow property specifies
            what happens if content overflows an element's box.
        </div>
    </body>
</html>
