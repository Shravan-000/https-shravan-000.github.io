<!DOCTYPE html>
<html>
    <head>
        <style>
            div.a{
                text-transform: uppercase;
            }
            div.b{
                text-transform: lowercase;
            }
            div.c{
                text-transform: capitalize;
            }
        </style>
    </head>
    <body>
        <h1>The Text-Transform Property</h1>
        <h2>text-tranform: uppercase:</h2>
        <div class="a">this Sentence is in upper case</div>
        <h2>The text-tranform: lowercase:</h2>
        <div class="b">THIS SENTENCE IS IN LOWER CASE</div>
        <h2>text-transform: capitalize:</h2>
        <div class="c">this sentence is capitalized</div>
    </body>
</html>
