<!DOCTYPE html>
<html>
    <head>
        <style>
            div{
                border: 1px solid black;
                margin-top: 150px;
                margin-bottom: 100px;
                margin-right: 100px;
                margin-left: 100px;
                background-color: lightblue;
            }
        </style>
    </head>
    <body>
    <h2>Using Individual margin properties</h2>
    <div>This div element has a top margin of 100px,
        a right margin of 150px, a bottom margin of 100px, and a left margin of 80 px.</div>
        </body>
        </html>
